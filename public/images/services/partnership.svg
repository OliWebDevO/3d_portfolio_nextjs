<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56" fill="none">
  <defs>
    <linearGradient id="g-partner" x1="28" y1="4" x2="28" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Left speech bubble -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.03;0.08;0.88;0.95;1" dur="7s" repeatCount="indefinite"/>
    <rect x="4" y="10" width="24" height="18" rx="4" stroke="url(#g-partner)" stroke-width="2" fill="none"/>
    <polygon points="12,28 16,34 20,28" fill="url(#g-partner)"/>
    <line x1="10" y1="17" x2="22" y2="17" stroke="url(#g-partner)" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="22" x2="18" y2="22" stroke="url(#g-partner)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Right speech bubble (delayed) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.1;0.15;0.88;0.95;1" dur="7s" repeatCount="indefinite"/>
    <rect x="28" y="20" width="24" height="18" rx="4" stroke="url(#g-partner)" stroke-width="2" fill="none"/>
    <polygon points="36,38 40,44 44,38" fill="url(#g-partner)"/>
    <line x1="34" y1="27" x2="46" y2="27" stroke="url(#g-partner)" stroke-width="2" stroke-linecap="round"/>
    <line x1="34" y1="32" x2="42" y2="32" stroke="url(#g-partner)" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
